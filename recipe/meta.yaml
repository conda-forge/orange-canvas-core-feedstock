{% set name = "orange-canvas-core" %}
{% set version = "0.2.8" %}
{% set sha256 = "60b460ea492c64d9d4b9ade1c06e3d7d2fc1ce960d89208515b8eaad90bdef32" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - trubar >=0.3.3
  run:
    - python >={{ python_min }}
    - anyqt >=0.2.0
    - docutils
    - commonmark >=0.8.1
    - requests
    - requests-cache
    - pip >=18.0
    - dictdiffer
    - qasync >=0.10.0
    - pyqt
    - packaging
    - numpy
    - truststore

test:
  requires:
    - python {{ python_min }}
  imports:
    - orangecanvas.main
    - orangecanvas.application.canvasmain

about:
  home: https://github.com/biolab/orange-canvas-core
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE.txt
  summary: Core component of Orange Canvas

  description: |
    Orange Canvas Core is is a framework for building graphical user
    interfaces for editing workflows. It is a component used to build
    the Orange Canvas (http://orange.biolab.si) data-mining application
    (for which it was developed in the first place).

  doc_url: https://orange-canvas-core.readthedocs.io/
  dev_url: https://github.com/biolab/orange-canvas-core

extra:
  recipe-maintainers:
    - ales-erjavec
    - lanzagar
    - markotoplak
    - primozgodec
